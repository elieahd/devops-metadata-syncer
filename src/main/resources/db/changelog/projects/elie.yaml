databaseChangeLog:
  - changeSet:
      id: projects-elie-001
      author: elie.ahd
      changes:
        - insert:
            tableName: project
            columns:
              - column:
                  name: key
                  value: "AHD"
              - column:
                  name: name
                  value: "Elie AHD"
              - column:
                  name: organization_id
                  valueComputed: "(SELECT id FROM organization WHERE label = 'Personal')"
        - insert:
            tableName: project_contact
            columns:
              - column:
                  name: first_name
                  value: "Elie"
              - column:
                  name: last_name
                  value: "Daher"
              - column:
                  name: mail
                  value: "eliedhr@gmail.com"
              - column:
                  name: project_id
                  valueComputed: "(SELECT id FROM project WHERE key = 'AHD')"
        - insert:
            tableName: repository
            columns:
              - column:
                  name: organization
                  value: "elieahd"
              - column:
                  name: name
                  value: "my-docs"
              - column:
                  name: source
                  value: "GITHUB"
              - column:
                  name: project_id
                  valueComputed: "(SELECT id FROM project WHERE key = 'AHD')"
        - insert:
            tableName: repository
            columns:
              - column:
                  name: organization
                  value: "elieahd"
              - column:
                  name: name
                  value: "randomizer"
              - column:
                  name: source
                  value: "GITHUB"
              - column:
                  name: project_id
                  valueComputed: "(SELECT id FROM project WHERE key = 'AHD')"
      rollback:
        - delete:
            tableName: project_contact
            where: "project_id = (SELECT id FROM project WHERE key = 'AHD')"
        - delete:
            tableName: repository
            where: "project_id = (SELECT id FROM project WHERE key = 'AHD')"
        - delete:
            tableName: project
            where: "key = 'AHD'"