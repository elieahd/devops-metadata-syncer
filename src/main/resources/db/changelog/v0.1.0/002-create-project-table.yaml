databaseChangeLog:
  - changeSet:
      id: v0.1.0-002
      author: elie.ahd
      changes:
        - createSequence:
            sequenceName: project_id_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            cycle: false
        - createTable:
            tableName: project
            columns:
              - column:
                  name: id
                  type: bigint
                  defaultValueSequenceNext: project_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: varchar(10)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_project_key
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: organization_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_organization_project
                    references: organization(id)
      rollback:
        - dropTable:
            tableName: project
        - dropSequence:
            sequenceName: project_id_seq