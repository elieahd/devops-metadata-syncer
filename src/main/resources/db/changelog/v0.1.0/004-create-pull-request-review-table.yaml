databaseChangeLog:
  - changeSet:
      id: v0.1.0-004
      author: elie.ahd
      changes:
        - createSequence:
            sequenceName: pull_request_review_id_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            cycle: false
        - createTable:
            tableName: pull_request_review
            columns:
              - column:
                  name: id
                  type: bigint
                  defaultValueSequenceNext: pull_request_review_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: reviewer
                  type: varchar(255)
              - column:
                  name: state
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: submitted_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: pull_request_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pull_request_review_pull_request
                    references: pull_request(id)
        - createIndex:
            indexName: idx_pull_request_review_pull_request_id
            tableName: pull_request_review
            columns:
              - column:
                  name: pull_request_id
      rollback:
        - dropIndex:
            indexName: idx_pull_request_review_pull_request_id
            tableName: pull_request_review
        - dropTable:
            tableName: pull_request_review
        - dropSequence:
            sequenceName: pull_request_review_id_seq