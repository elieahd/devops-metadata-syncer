databaseChangeLog:
  - changeSet:
      id: v0.1.0-005
      author: elie.ahd
      changes:
        - createSequence:
            sequenceName: pipeline_id_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            cycle: false
        - createTable:
            tableName: pipeline
            columns:
              - column:
                  name: id
                  type: bigint
                  defaultValueSequenceNext: pipeline_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: source_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: repository_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pipeline_repository
                    references: repository(id)
        - createIndex:
            indexName: idx_pipeline_repository_id
            tableName: pipeline
            columns:
              - column:
                  name: repository_id
        - addUniqueConstraint:
            tableName: pipeline
            columnNames: source_id, repository_id
            constraintName: uq_pipeline_source_id_repository_id
      rollback:
        - dropIndex:
            indexName: idx_pipeline_repository_id
            tableName: pipeline
        - dropTable:
            tableName: pipeline
        - dropSequence:
            sequenceName: pipeline_id_seq