databaseChangeLog:
  - changeSet:
      id: v0.1.0-006
      author: elie.ahd
      changes:
        - createSequence:
            sequenceName: pipeline_run_id_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            cycle: false
        - createTable:
            tableName: pipeline_run
            columns:
              - column:
                  name: id
                  type: bigint
                  defaultValueSequenceNext: pipeline_run_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: success
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: duration_seconds
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: pipeline_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pipeline_run_pipeline
                    references: pipeline(id)
        - createIndex:
            indexName: idx_pipeline_run_pipeline_id
            tableName: pipeline_run
            columns:
              - column:
                  name: pipeline_id
      rollback:
        - dropIndex:
            indexName: idx_pipeline_run_pipeline_id
            tableName: pipeline_run
        - dropTable:
            tableName: pipeline_run
        - dropSequence:
            sequenceName: pipeline_run_id_seq