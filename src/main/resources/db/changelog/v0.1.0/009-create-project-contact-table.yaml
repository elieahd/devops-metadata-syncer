databaseChangeLog:
  - changeSet:
      id: v0.1.0-009
      author: elie.ahd
      changes:
        - createSequence:
            sequenceName: project_contact_id_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            cycle: false
        - createTable:
            tableName: project_contact
            columns:
              - column:
                  name: id
                  type: bigint
                  defaultValueSequenceNext: project_contact_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_contact_project
                    references: project(id)
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: mail
                  type: varchar(255)
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: project_contact
        - dropSequence:
            sequenceName: project_contact_id_seq
