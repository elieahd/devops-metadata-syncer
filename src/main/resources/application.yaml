spring:
  application:
    name: DevOps Platform API
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

springdoc:
  swagger-ui:
    enabled: ${DOC_ENABLED:false}
  api-docs:
    enabled: ${DOC_ENABLED:false}

source:
  github:
    url: https://api.github.com
    token: ${GITHUB_TOKEN}
  enterprise-github:
    url: ${ENTERPRISE_GITHUB_URL:https://api.github.com}
    token: ${ENTERPRISE_GITHUB_TOKEN}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: devops.platform.infrastructure.outbound.database.types
